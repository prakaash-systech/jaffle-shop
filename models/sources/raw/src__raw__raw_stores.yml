version: 2

sources:
  - name: ecom
    schema: raw
    description: E-commerce data for the Jaffle Shop
    tables:
      - name: raw_stores
        loaded_at_field: opened_at
        columns:
          - name: ID
            description: Primary key for stores
          - name: NAME
            description: Store name
          - name: OPENED_AT
            description: Timestamp when the store was opened
          - name: TAX_RATE
            description: Tax rate applied at the store
